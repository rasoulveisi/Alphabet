<section class="flex min-h-0 flex-1 flex-col overflow-hidden">
  <header
    class="shrink-0 border-b border-neutral-200 bg-neutral-50/95 px-3 pb-3 pt-2 backdrop-blur-sm sm:px-4"
  >
    <app-page-nav />
  </header>
  <div class="min-h-0 flex-1 overflow-y-auto overscroll-contain px-4 py-6">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight text-neutral-900">Letterwise</h1>
      <p class="mt-2 text-sm leading-relaxed text-neutral-600">
        Letterwise helps you pick up real-world letters fast: learn a full script, then practice with hints that fade.
        Not a grammar or conversation course.
      </p>
    </div>

    <ul class="mt-6 flex flex-col gap-3">
      @for (s of scripts; track s.id) {
        <li>
          <a
            class="flex min-h-14 flex-col justify-center rounded-xl border border-neutral-200 bg-white px-4 py-3 shadow-sm outline-none transition-colors active:bg-neutral-50 focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2"
            [routerLink]="['/', s.id, 'learn', '0']"
          >
            <span class="text-base font-semibold text-neutral-900">{{ s.name }}</span>
            <span class="text-sm text-neutral-600">{{ s.nativeLabel }} — {{ s.tagline }}</span>
          </a>
        </li>
      }
    </ul>
  </div>
</section>
