<div class="flex min-h-0 flex-1 flex-col overflow-hidden">
  @if (done()) {
    <div class="flex min-h-0 flex-1 flex-col overflow-hidden">
      <div class="min-h-0 flex-1 overflow-y-auto overscroll-contain px-4 py-6">
        <h2 class="text-xl font-semibold text-neutral-900">Session complete</h2>
      </div>
      <footer
        class="shrink-0 border-t border-neutral-200 bg-neutral-50/95 px-3 pt-3 pb-[max(0.75rem,env(safe-area-inset-bottom))] backdrop-blur-sm sm:px-4"
      >
        <div class="mx-auto flex w-full max-w-md flex-col gap-2">
          <a
            class="inline-flex min-h-12 w-full items-center justify-center rounded-lg bg-neutral-900 px-4 text-base font-semibold text-white outline-none active:bg-neutral-800 focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2"
            routerLink="../learn/0"
            >Review alphabet lesson</a
          >
          <a
            class="inline-flex min-h-11 w-full items-center justify-center rounded-lg border border-neutral-200 bg-white px-4 text-sm font-semibold text-neutral-900 outline-none active:bg-neutral-100 focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2"
            routerLink="/"
            >Back home</a
          >
        </div>
      </footer>
    </div>
  } @else if (current(); as ex) {
    <div class="min-h-0 flex-1 overflow-y-auto overscroll-contain px-4 py-4">
      @switch (ex.kind) {
        @case ('letter-pick') {
          <app-letter-pick
            [targetLetter]="ex.targetLetter"
            [latinFull]="ex.latinFull"
            [hintLevel]="hintFor(ex.targetLetter)"
            [options]="ex.options"
            (chosen)="onAnswer(ex.targetLetter, $event === ex.targetLetter)"
          />
        }
        @case ('minimal-pair') {
          <app-minimal-pair-pick
            [glyphs]="ex.glyphs"
            [targetLetter]="ex.targetLetter"
            [latinFull]="ex.latinFull"
            [hintLevel]="hintFor(ex.targetLetter)"
            (chosen)="onAnswer(ex.targetLetter, $event === ex.targetLetter)"
          />
        }
      }
    </div>
  }
</div>
