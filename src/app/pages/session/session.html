@if (done()) {
  <section class="flex flex-col gap-3 px-4 py-6">
    <h2 class="text-xl font-semibold text-neutral-900">Session complete</h2>
    <a
      class="inline-flex min-h-11 items-center text-base font-semibold text-blue-700 underline decoration-blue-700/30 underline-offset-4"
      routerLink="/learn"
      >Review alphabet lesson</a
    >
    <a
      class="inline-flex min-h-11 items-center text-base font-semibold text-neutral-900 underline decoration-neutral-400 underline-offset-4"
      routerLink="/"
      >Back home</a
    >
  </section>
} @else if (current(); as ex) {
  @switch (ex.kind) {
    @case ('letter-pick') {
      <app-letter-pick
        [targetLetter]="ex.targetLetter"
        [latinFull]="ex.latinFull"
        [hintLevel]="hintFor(ex.targetLetter)"
        [options]="ex.options"
        (chosen)="onAnswer(ex.targetLetter, $event === ex.targetLetter)"
      />
    }
    @case ('minimal-pair') {
      <app-minimal-pair-pick
        [glyphs]="ex.glyphs"
        [targetLetter]="ex.targetLetter"
        [latinFull]="ex.latinFull"
        [hintLevel]="hintFor(ex.targetLetter)"
        (chosen)="onAnswer(ex.targetLetter, $event === ex.targetLetter)"
      />
    }
  }
}
